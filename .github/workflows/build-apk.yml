name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || echo "Android platform already exists"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Copy custom app icons
        run: |
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          
          cp app-icons/mipmap-mdpi/EGO.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png || true
          cp app-icons/mipmap-hdpi/EGO.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png || true
          cp app-icons/mipmap-xhdpi/EGO.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png || true
          cp app-icons/mipmap-xxhdpi/EGO.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png || true
          cp app-icons/mipmap-xxxhdpi/EGO.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png || true
          
          cp app-icons/mipmap-mdpi/EGO_round.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png || true
          cp app-icons/mipmap-hdpi/EGO_round.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png || true
          cp app-icons/mipmap-xhdpi/EGO_round.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png || true
          cp app-icons/mipmap-xxhdpi/EGO_round.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png || true
          cp app-icons/mipmap-xxxhdpi/EGO_round.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png || true
          
          cp app-icons/mipmap-mdpi/EGO_foreground.png android/app/src/main/res/mipmap-mdpi/ic_launcher_foreground.png || true
          cp app-icons/mipmap-hdpi/EGO_foreground.png android/app/src/main/res/mipmap-hdpi/ic_launcher_foreground.png || true
          cp app-icons/mipmap-xhdpi/EGO_foreground.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_foreground.png || true
          cp app-icons/mipmap-xxhdpi/EGO_foreground.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_foreground.png || true
          cp app-icons/mipmap-xxxhdpi/EGO_foreground.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.png || true
          
          echo "✅ Icônes EGO copiées avec succès"
          ls -la android/app/src/main/res/mipmap-xxxhdpi/

      - name: Fix Kotlin version conflict
        run: |
          cat >> android/build.gradle << 'EOF'

          allprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.24'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.24'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.24'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-common:1.9.24'
                  }
              }
          }
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: InFinance-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
